<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý người dùng - Susan Admin</title>
  <link rel="stylesheet" href="../styles/shared.css">
  <link rel="stylesheet" href="../styles/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-body">
  <div class="admin-wrapper">
    <aside class="admin-sidebar">
      <div class="sidebar-logo"><i class="fas fa-mug-hot"></i><span>Susan Admin</span></div>
      <nav class="sidebar-nav">
        <a href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box"></i> Sản phẩm</a>
        <a href="categories.html"><i class="fas fa-tags"></i> Danh mục</a>
        <a href="orders.html"><i class="fas fa-receipt"></i> Đơn hàng</a>
        <a href="users.html" class="active"><i class="fas fa-users"></i> Người dùng</a>
        <a href="../users/index.html"><i class="fas fa-store"></i> Xem cửa hàng</a>
      </nav>
      <div class="sidebar-logout">
        <button id="logout-btn"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1><i class="fas fa-users"></i> Quản lý người dùng</h1>
        <button class="btn-add" onclick="showAddForm()">
          <i class="fas fa-plus"></i> Thêm người dùng
        </button>
      </div>

      <!-- Add/Edit Form -->
      <div id="form-add-user" class="admin-panel" style="display:none;margin-bottom:20px">
        <div class="panel-header">
          <h3 id="form-title"><i class="fas fa-user-plus"></i> Thêm người dùng mới</h3>
        </div>
        <div class="panel-body">
          <input type="hidden" id="user-id">
          <div class="form-grid">
            <div class="form-group">
              <label><i class="fas fa-user"></i> Họ và tên *</label>
              <input type="text" id="user-name" placeholder="Phan Đức Trung">
            </div>
            <div class="form-group">
              <label><i class="fas fa-envelope"></i> Email *</label>
              <input type="email" id="user-email" placeholder="example@gmail.com">
            </div>
            <div class="form-group">
              <label><i class="fas fa-lock"></i> Mật khẩu</label>
              <input type="password" id="user-password" placeholder="Để trống = giữ nguyên">
            </div>
            <div class="form-group">
              <label><i class="fas fa-phone"></i> Số điện thoại</label>
              <input type="tel" id="user-phone" placeholder="096 1111 913">
            </div>
            <div class="form-group">
              <label><i class="fas fa-map-marker-alt"></i> Địa chỉ</label>
              <input type="text" id="user-address" placeholder="Bình Sơn, Quảng Ngãi">
            </div>
            <div class="form-group">
              <label><i class="fas fa-shield-alt"></i> Quyền hạn</label>
              <select id="user-role">
                <option value="user">User</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn-save" onclick="saveUser()"><i class="fas fa-save"></i> Lưu người dùng</button>
            <button class="btn-cancel" onclick="document.getElementById('form-add-user').style.display='none'"><i class="fas fa-times"></i> Hủy</button>
          </div>
        </div>
      </div>

      <!-- Users Table -->
      <div class="admin-panel">
        <div class="panel-header"><h3><i class="fas fa-list"></i> Danh sách người dùng</h3></div>
        <div class="panel-body" style="padding:0">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>Email</th>
                <th>Điện thoại</th>
                <th>Địa chỉ</th>
                <th>Quyền</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="user-list">
              <tr><td colspan="7" style="text-align:center;padding:30px"><div class="spinner" style="margin:0 auto"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="js/users.js"></script>
</body>
</html>
