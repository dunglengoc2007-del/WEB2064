<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý sản phẩm - Susan Admin</title>
  <link rel="stylesheet" href="../styles/shared.css">
  <link rel="stylesheet" href="../styles/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-body">
  <div class="admin-wrapper">
    <aside class="admin-sidebar">
      <div class="sidebar-logo"><i class="fas fa-mug-hot"></i><span>Susan Admin</span></div>
      <nav class="sidebar-nav">
        <a href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="products.html" class="active"><i class="fas fa-box"></i> Sản phẩm</a>
        <a href="categories.html"><i class="fas fa-tags"></i> Danh mục</a>
        <a href="orders.html"><i class="fas fa-receipt"></i> Đơn hàng</a>
        <a href="users.html"><i class="fas fa-users"></i> Người dùng</a>
        <a href="../users/index.html"><i class="fas fa-store"></i> Xem cửa hàng</a>
      </nav>
      <div class="sidebar-logout">
        <button id="logout-btn"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1><i class="fas fa-box"></i> Quản lý sản phẩm</h1>
        <button class="btn-add" onclick="showAddProduct()">
          <i class="fas fa-plus"></i> Thêm sản phẩm
        </button>
      </div>

      <!-- Add/Edit Form -->
      <div id="form-add-product" class="admin-panel" style="display:none;margin-bottom:20px">
        <div class="panel-header">
          <h3 id="form-product-title"><i class="fas fa-plus"></i> Thêm sản phẩm mới</h3>
        </div>
        <div class="panel-body">
          <div class="form-grid">
            <div class="form-group">
              <label><i class="fas fa-tag"></i> Tên sản phẩm *</label>
              <input type="text" id="p-name" placeholder="Cà phê sữa đá">
            </div>
            <div class="form-group">
              <label><i class="fas fa-align-left"></i> Mô tả</label>
              <input type="text" id="p-detail" placeholder="Mô tả sản phẩm...">
            </div>
            <div class="form-group">
              <label><i class="fas fa-coins"></i> Giá *</label>
              <input type="number" id="p-price" placeholder="35000" min="0">
            </div>
            <div class="form-group">
              <label><i class="fas fa-image"></i> URL hình ảnh</label>
              <input type="text" id="p-image" placeholder="https://images.unsplash.com/...">
            </div>
            <div class="form-group">
              <label><i class="fas fa-tags"></i> Danh mục *</label>
              <select id="p-cate">
                <option value="">-- Chọn danh mục --</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn-save" onclick="saveProduct()"><i class="fas fa-save"></i> Lưu sản phẩm</button>
            <button class="btn-cancel" onclick="document.getElementById('form-add-product').style.display='none'"><i class="fas fa-times"></i> Hủy</button>
          </div>
        </div>
      </div>

      <!-- Product Table -->
      <div class="admin-panel">
        <div class="panel-header"><h3><i class="fas fa-list"></i> Danh sách sản phẩm</h3></div>
        <div class="panel-body" style="padding:0">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Ảnh</th>
                <th>Tên sản phẩm</th>
                <th>Mô tả</th>
                <th>Giá</th>
                <th>Danh mục</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="product-list">
              <tr><td colspan="7" style="text-align:center;padding:30px"><div class="spinner" style="margin:0 auto"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="js/products.js"></script>
</body>
</html>
