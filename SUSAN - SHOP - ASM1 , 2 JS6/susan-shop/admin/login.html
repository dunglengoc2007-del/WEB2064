<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Đăng nhập - Susan Coffee &amp; Tea</title>
  <link rel="stylesheet" href="../styles/shared.css">
  <link rel="stylesheet" href="../styles/auth.css">
  <link rel="stylesheet" href="../styles/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <div class="header-container">
      <a href="../users/index.html" class="logo">
        <i class="fas fa-mug-hot"></i>
        <h1>Susan Admin</h1>
      </a>
    </div>
  </header>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon" style="background:linear-gradient(135deg,var(--pink-700),var(--pink-900))">
          <i class="fas fa-shield-alt"></i>
        </div>
        <h2>Trang quản trị</h2>
        <p>Chỉ dành cho quản trị viên</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email Admin</label>
          <input type="email" id="email" placeholder="admin@susan.com" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Mật khẩu</label>
          <input type="password" id="password" placeholder="Nhập mật khẩu" required>
        </div>
        <button type="submit" class="auth-btn">
          <i class="fas fa-sign-in-alt"></i> Đăng nhập Admin
        </button>
      </form>

      <div class="auth-links">
        <a href="../users/index.html"><i class="fas fa-home"></i> Về trang chủ</a>
      </div>

      <div class="auth-demo">
        <p style="font-weight:700;margin-bottom:8px;color:var(--pink-700)"><i class="fas fa-info-circle"></i> 
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-bottom" style="text-align:center;padding:16px;color:var(--pink-200);font-size:0.85rem">
      <p>&copy; 2026 Susan Coffee &amp; Tea. Admin Panel.</p>
    </div>
  </footer>

  <script src="js/login.js"></script>
</body>
</html>
