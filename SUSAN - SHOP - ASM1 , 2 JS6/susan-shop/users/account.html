<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tài khoản - Susan Coffee &amp; Tea</title>
  <link rel="stylesheet" href="../styles/shared.css">
  <link rel="stylesheet" href="../styles/account.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <div class="header-container">
      <a href="index.html" class="logo">
        <i class="fas fa-mug-hot"></i>
        <h1>Susan Coffee &amp; Tea</h1>
      </a>
      <nav>
        <a href="index.html"><i class="fas fa-home"></i><span>Trang chủ</span></a>
        <a href="account.html" class="active"><i class="fas fa-user"></i><span>Tài khoản</span></a>
        <a href="cart.html"><i class="fas fa-shopping-cart"></i><span>Giỏ hàng</span></a>
        <a href="order.html"><i class="fas fa-receipt"></i><span>Đơn hàng</span></a>
      </nav>
      <div class="search-container">
        <input type="text" id="search-input" placeholder="Tìm kiếm...">
        <button><i class="fas fa-search"></i></button>
      </div>
    </div>
  </header>

  <main class="account-container">
    <div class="account-card">
      <div class="account-header">
        <div class="avatar">
          <i class="fas fa-user-circle"></i>
        </div>
        <h2 id="user-display-name">Người dùng</h2>
        <p>Thành viên Susan Coffee &amp; Tea</p>
      </div>

      <form id="user-form" class="account-form">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Họ và tên</label>
          <input type="text" id="name" placeholder="Nguyễn Văn A" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="email" placeholder="example@gmail.com" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-phone"></i> Số điện thoại</label>
          <input type="tel" id="phone" placeholder="0900 123 456">
        </div>
        <div class="form-group">
          <label><i class="fas fa-map-marker-alt"></i> Địa chỉ</label>
          <input type="text" id="address" placeholder="123 Đường ABC, Quận 1, TP.HCM">
        </div>
        <button type="submit" id="update-btn" class="auth-btn">
          <i class="fas fa-save"></i> Lưu thay đổi
        </button>
      </form>

      <div class="account-links">
        <a href="order.html"><i class="fas fa-receipt"></i> Xem đơn hàng của tôi</a>
        <button id="logout-btn" class="logout-btn">
          <i class="fas fa-sign-out-alt"></i> Đăng xuất
        </button>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-section">
        <h3><i class="fas fa-store"></i> Susan Coffee &amp; Tea</h3>
        <p><i class="fas fa-map-marker-alt"></i> Bình Sơn, Quảng Ngãi </p>
        <p><i class="fas fa-phone"></i> 096.1111.913 </p>
        <p><i class="fas fa-envelope"></i> susan.coffee@gmail.com</p>
      </div>
      <div class="footer-section">
        <h3><i class="fas fa-link"></i> Truy cập nhanh</h3>
        <a href="index.html"><i class="fas fa-home"></i> Trang chủ</a>
        <a href="cart.html"><i class="fas fa-shopping-cart"></i> Giỏ hàng</a>
        <a href="order.html"><i class="fas fa-receipt"></i> Đơn hàng</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 Susan Coffee &amp; Tea. All rights reserved.</p>
    </div>
  </footer>

  <script src="../js/api.js"></script>
  <script src="../js/account.js"></script>
</body>
</html>
