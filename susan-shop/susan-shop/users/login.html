<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Susan Coffee &amp; Tea</title>
  <link rel="stylesheet" href="../styles/shared.css">
  <link rel="stylesheet" href="../styles/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <div class="header-container">
      <a href="index.html" class="logo">
        <i class="fas fa-mug-hot"></i>
        <h1>Susan Coffee &amp; Tea</h1>
      </a>
      <nav>
        <a href="index.html"><i class="fas fa-home"></i><span>Trang chủ</span></a>
        <a href="register.html"><i class="fas fa-user-plus"></i><span>Đăng ký</span></a>
      </nav>
    </div>
  </header>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon"><i class="fas fa-mug-hot"></i></div>
        <h2>Chào mừng trở lại</h2>
        <p>Đăng nhập để tiếp tục mua sắm</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="email" placeholder="example@gmail.com" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Mật khẩu</label>
          <input type="password" id="password" placeholder="Nhập mật khẩu" required>
        </div>
        <button type="submit" class="auth-btn">
          <i class="fas fa-sign-in-alt"></i> Đăng nhập
        </button>
      </form>

      <div class="auth-links">
        <a href="forgot_password.html"><i class="fas fa-key"></i> Quên mật khẩu?</a>
        <a href="register.html"><i class="fas fa-user-plus"></i> Tạo tài khoản mới</a>
      </div>

      <div class="auth-demo">
        <p style="font-weight:700;margin-bottom:8px;color:var(--pink-700)"><i class="fas fa-info-circle"></i> Tài khoản thử nghiệm:</p>
        <div class="demo-account">
          <strong>Admin:</strong> admin@susan.com / 123456<br>
          <strong>User:</strong> nguyen.an@email.com / 123456
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-bottom" style="text-align:center;padding:16px;color:var(--pink-200);font-size:0.85rem">
      <p>&copy; 2026 Susan Coffee &amp; Tea. All rights reserved.</p>
    </div>
  </footer>

  <script src="../js/api.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
