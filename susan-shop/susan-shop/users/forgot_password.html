<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên mật khẩu - Susan Coffee &amp; Tea</title>
  <link rel="stylesheet" href="../styles/shared.css">
  <link rel="stylesheet" href="../styles/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <div class="header-container">
      <a href="index.html" class="logo">
        <i class="fas fa-mug-hot"></i>
        <h1>Susan Coffee &amp; Tea</h1>
      </a>
      <nav>
        <a href="index.html"><i class="fas fa-home"></i><span>Trang chủ</span></a>
        <a href="login.html"><i class="fas fa-sign-in-alt"></i><span>Đăng nhập</span></a>
      </nav>
    </div>
  </header>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon"><i class="fas fa-key"></i></div>
        <h2>Quên mật khẩu?</h2>
        <p>Nhập email để đặt lại mật khẩu</p>
      </div>

      <form id="forgot-form">
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email đã đăng ký</label>
          <input type="email" id="email" placeholder="example@gmail.com" required>
        </div>
        <button type="submit" class="auth-btn">
          <i class="fas fa-key"></i> Xác nhận
        </button>
      </form>

      <div class="auth-links">
        <a href="login.html"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a>
        <a href="register.html"><i class="fas fa-user-plus"></i> Tạo tài khoản mới</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-bottom" style="text-align:center;padding:16px;color:var(--pink-200);font-size:0.85rem">
      <p>&copy; 2026 Susan Coffee &amp; Tea. All rights reserved.</p>
    </div>
  </footer>

  <script src="../js/api.js"></script>
  <script src="../js/forgot_password.js"></script>
</body>
</html>
